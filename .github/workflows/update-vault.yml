name: Update vault

on:
  schedule:
    - cron: "0 5 * * *"      # daily 05:00 UTC — incremental update
    - cron: "0 4 * * 1"      # weekly Mon 04:00 UTC — refresh topics + recluster
  workflow_dispatch:
    inputs:
      recluster:
        description: "Force a full recluster"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service-account credentials
        run: printf '%s' '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' > credentials.json

      - name: Run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ./credentials.json
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 4 * * 1" ] || [ "${{ inputs.recluster }}" = "true" ]; then
            python -m src.main refresh-topics
            python -m src.main update --recluster
          else
            python -m src.main update
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/ data/
          git diff --staged --quiet || git commit -m "🤖 Update vault $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
